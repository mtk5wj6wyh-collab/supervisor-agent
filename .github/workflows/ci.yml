name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  mock-self-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run offline mock self-test
        run: python .codebuddy/skills/supervisor-agent/scripts/run.py --tasks example_tasks.json --mock --workspace ./ci_workspace

      - name: Cleanup workspace
        if: always()
        run: rm -rf ci_workspace
